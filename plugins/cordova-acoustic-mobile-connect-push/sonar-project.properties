sonar.projectKey=cordova-acoustic-connect
sonar.projectName=Cordova Acoustic Connect
sonar.projectVersion=0.1.0

sonar.host.url=https://sonarqube.acoustic.co

# Sources: plugin surface only — exclude demo app + generated platform output
sonar.sources=src,www,types
sonar.tests=__tests__,src/android/src/test

sonar.exclusions=\
  **/node_modules/**,\
  applications/**,\
  platforms/**,\
  plugins/**,\
  **/build/**,\
  **/*.tgz

sonar.test.exclusions=\
  **/node_modules/**

sonar.language=
sonar.sourceEncoding=UTF-8

# JS / TS
sonar.javascript.environments=cordova,browser,node

# Android / Kotlin
sonar.kotlin.source=1.8
sonar.java.source=11

# Test result paths (no-op until QA stories in CA-137533 land actual tests)
sonar.junit.reportPaths=applications/Demo/platforms/android/app/build/test-results/testDebugUnitTest,applications/Demo/platforms/android/app/build/test-results/testReleaseUnitTest
sonar.testExecutionReportPaths=junit.xml

sonar.scm.exclusions.disabled=true
